      - incapacidad
      - incapacitado
      - medico
      - enfermo
      - licencia médica
      - enfermedad
      - reposo
    confianza_base: 0.95
    
  - nombre: "DESPRENDIBLE_PAGO"
    palabras_clave:
      - desprendible
      - colilla
      - pago
      - nomina
      - salario
      - sueldo
      - pago de nómina
      - liquidacion
    confianza_base: 0.95
    
  - nombre: "PERMISOS"
    palabras_clave:
      - permiso
      - día libre
      - familia
      - permiso remunerado
      - día de familia
      - salir temprano
    confianza_base: 0.90
    
