  - nombre: "VACACIONES"
    palabras_clave:
      - vacaciones
      - descanso
      - vacacion
      - disfrutar vacaciones
    confianza_base: 0.92
    
  - nombre: "CERTIFICACION_LABORAL"
    palabras_clave:
      - certificación
      - constancia
      - certificado laboral
      - carta laboral
    confianza_base: 0.90

  - nombre: "ORIENTACION"
    palabras_clave:
      - ayuda
      - no entiendo
      - qué puedo hacer
      - cómo funciona
      - me ayudas
      - que hago
      - opciones
      - menu
